  月薪喵是2026年6月在网络出圈的原创手绘猫咪表情包热梗，原型为博主饲养的布偶猫与流浪橘猫。 月薪喵IP原型取自博主饲养的布偶猫与流浪橘猫，布偶因购入花销刚好耗掉博主整月薪资得名月薪喵，搭档橘猫喵喵是被家人收留的流浪小猫。 博主以自家猫咪为原型创作表情包，其简约软萌的画风搭配贴合打工人收支、上班摆烂的趣味画面，通过魔性跳舞二创视频助推热度暴涨。
